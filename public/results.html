<!DOCTYPE html>
<link rel="stylesheet" href="css/product.css">   
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
</head>
<body>

<div id="sort">  <!-- Sorting options in a simple dropdown -->
    <select id="sort-by">
        <option value="relevance">Relevance</option> 
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Customer Rating</option>
    </select>

</div>

<div id="results"> <!-- Container for search results -->
    
    <div id="results-header"> <!-- Header for the results section -->
        <h1>Results</h1>
    </div>
    <div id="item-grid">

        <div class="product">
            <img src="/public/images/demo_book.avif" alt="Product Image" class="product-image">
            <div class="product-details">
                <div class="product-row">
                    <span class="label">Price:</span>
                    <span class="value">$19.99</span>
                </div>
                <div class="product-row">
                    <span class="label">Author:</span>
                    <span class="value">John Doe</span>
                </div>
                <div class="product-row">
                    <span class="label">Review:</span>
                    <span class="value">4.5 stars</span>
                </div>
            </div>
            <button class="add-to-cart">Add to Cart</button>
        </div>
        



    </div> 
    
</div>



</body>
</html>
