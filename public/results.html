<!DOCTYPE html>
<html lang="en">

<div id="sort">  <!-- Sorting options in a simple dropdown -->
    <select id="sort-by">
        <option value="relevance">Relevance</option> 
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating">Customer Rating</option>
    </select>

</div>

<div id="results"> <!-- Container for search results -->
    
    <div id="results-header"> <!-- Header for the results section -->
        <h1>Results</h1>
    </div>
    <div id="item-grid">

        <div class="product">
            <img src="/public/images/demo_book.avif" alt="Product Image" class="product-image">
            <h2 class="product-title">Product Title</h2>
            <p class="product-price">$19.99</p>
            <p class="product-rating">4.5 stars</p>
            <button class="add-to-cart">Add to Cart</button>
        </div>



    </div> 
    
</div>



</html>
